<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FD Dépenses">
  <meta name="theme-color" content="#111827">
  <title>Foyer Diallo</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
    html,body{height:100%;overflow:hidden;background:#111827;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif}
    .app{display:flex;flex-direction:column;height:100vh;height:calc(var(--vh,1vh)*100);max-width:430px;margin:0 auto;background:#f4f7fb;overflow:hidden}

    /* HEADER */
    .hd{background:linear-gradient(135deg,#111827,#1e293b);padding:env(safe-area-inset-top,12px) 14px 10px;flex-shrink:0}
    .hd-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .brand{display:flex;align-items:center;gap:8px}
    .bmark{width:28px;height:28px;border-radius:8px;background:#2457ff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
    .bname{font-size:13px;font-weight:600;color:#fff}
    .hd-btns{display:flex;gap:6px}
    .hbtn{font-size:11px;color:#94a3b8;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:4px}
    .hbtn.danger{color:#fca5a5;background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.25)}
    .hd-row2{display:flex;align-items:flex-end;justify-content:space-between}
    .amt-block{display:flex;align-items:baseline;gap:3px}
    .amt-cur{font-size:18px;color:#64748b}
    .amt-val{font-size:42px;font-weight:700;color:#fff;line-height:1;letter-spacing:-.02em;min-width:10px}
    .amt-empty{color:#334155}
    .amt-hint{font-size:10px;margin-top:3px;min-height:13px;color:#475569}
    .totaux{display:flex;flex-direction:column;align-items:flex-end;gap:3px;padding-bottom:2px}
    .total-grp{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:rgba(255,255,255,.12);color:#e2e8f0;white-space:nowrap}
    .total-jour{font-size:10px;color:#64748b;white-space:nowrap}
    .total-jour strong{color:#94a3b8}

    /* GROUPES */
    .groups-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0;padding:5px 6px}
    .grp-btn{border-radius:8px;padding:5px 3px;font-size:9px;font-weight:700;cursor:pointer;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .1s;position:relative;min-height:0;justify-content:center}
    .grp-btn i{font-size:15px}
    .grp-btn:active{transform:scale(.92)}
    .grp-btn.active{border-width:2px}
    .grp-badge{position:absolute;top:2px;right:2px;background:#ef4444;color:#fff;border-radius:999px;padding:1px 4px;font-size:8px;font-weight:700;line-height:1.4}

    /* CATÉGORIES */
    .cats-area{flex:1;padding:5px 6px;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
    .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;height:100%}
    .cat-btn{border-radius:12px;padding:8px 6px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:transform .1s,box-shadow .1s;position:relative}
    .cat-btn i{font-size:22px}
    .cat-btn.sel{box-shadow:0 0 0 3px #2457ff;transform:scale(1.03)}
    .cat-btn:active{transform:scale(.92)}
    .cat-today{position:absolute;bottom:4px;right:6px;font-size:9px;font-weight:700;opacity:.7}

    /* PAVÉ */
    .numpad{background:#fff;border-top:1px solid #e2e8f0;padding:5px 6px calc(env(safe-area-inset-bottom,0px) + 6px);flex-shrink:0}
    .np-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:4px}
    .np{height:42px;border-radius:10px;border:none;font-size:20px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .07s}
    .np:active{transform:scale(.88)}
    .np-num{background:#f1f5f9;color:#111827}
    .np-del{background:#fee2e2;color:#dc2626;font-size:18px}
    .np-dot{background:#f1f5f9;color:#111827;font-size:22px}
    .np-ok{background:linear-gradient(135deg,#111827,#1e293b);color:#fff;font-size:13px;font-weight:600;gap:6px;width:100%;border-radius:10px;height:42px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .np-ok:disabled{opacity:.35}

    /* HISTORIQUE */
    .hist-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none;align-items:flex-end;max-width:430px;margin:0 auto}
    .hist-overlay.open{display:flex}
    .hist-sheet{background:#f4f7fb;width:100%;border-radius:20px 20px 0 0;max-height:85vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,0px)}
    .hist-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px;border-bottom:1px solid #e2e8f0;flex-shrink:0}
    .hist-title{font-size:15px;font-weight:600;color:#0f172a}
    .hist-close{font-size:12px;color:#64748b;background:#f1f5f9;border:none;border-radius:7px;padding:6px 12px;cursor:pointer}
    .hist-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
    .hist-total{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 14px;font-size:13px;color:#166534;margin-bottom:4px;font-weight:600}
    .hist-day-hd{display:flex;justify-content:space-between;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748b;padding:6px 2px 3px}
    .hist-item{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
    .hist-item.archived{opacity:.6;background:#f8fafc}
    .hi-cat{font-size:10px;color:#64748b;margin-bottom:2px}
    .hi-name{font-size:13px;font-weight:600;color:#0f172a}
    .hi-badge{background:#e2e8f0;color:#64748b;border-radius:999px;padding:1px 7px;font-size:10px;margin-left:4px;font-weight:400}
    .hi-right{display:flex;align-items:center;gap:6px}
    .hi-amt{font-size:15px;font-weight:700}
    .hi-edit{background:#e0f2fe;color:#0369a1;border:none;border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0}
    .hi-del{background:#fee2e2;color:#dc2626;border:none;border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0}
    .hist-empty{text-align:center;padding:32px;color:#94a3b8;font-size:13px}
    .hist-loading{text-align:center;padding:20px;color:#94a3b8;font-size:13px}

    /* MODAL ÉDITION */
    .edit-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
    .edit-card{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:320px}
    .edit-title{font-size:16px;font-weight:600;margin-bottom:16px;color:#0f172a}
    .edit-field{margin-bottom:12px}
    .edit-field label{font-size:12px;color:#64748b;display:block;margin-bottom:4px;font-weight:600}
    .edit-field input,.edit-field select{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:10px;font-size:15px;outline:none;user-select:auto;-webkit-user-select:auto}
    .edit-field input:focus,.edit-field select:focus{border-color:#2457ff}
    .edit-btns{display:flex;gap:8px;margin-top:16px}
    .edit-save{flex:1;background:linear-gradient(135deg,#111827,#1e293b);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer}
    .edit-cancel{background:#f1f5f9;color:#64748b;border:none;border-radius:10px;padding:12px;font-size:14px;cursor:pointer;width:80px}

    /* TOAST */
    .toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);left:12px;right:12px;max-width:430px;margin:0 auto;background:#065f46;color:#d1fae5;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;z-index:200;display:flex;align-items:center;gap:8px;pointer-events:none}
    .toast.show{opacity:1}
    .toast.warn{background:#7f1d1d;color:#fecaca}
  </style>
</head>
<body>
<div class="app">
  <div class="hd">
    <div class="hd-row1">
      <div class="brand"><div class="bmark">FD</div><div class="bname">Foyer Diallo</div></div>
      <div class="hd-btns">
        <button class="hbtn danger" onclick="resetTotaux()">↺ Reset</button>
        <button class="hbtn" id="histBtn" onclick="openHist()">⏱ Historique</button>
      </div>
    </div>
    <div class="hd-row2">
      <div>
        <div class="amt-block"><span class="amt-cur">€</span><span class="amt-val amt-empty" id="amtVal">0</span></div>
        <div class="amt-hint" id="amtHint">Choisissez une catégorie</div>
      </div>
      <div class="totaux">
        <div class="total-grp" id="totalGrp" style="visibility:hidden">—</div>
        <div class="total-jour" id="totalJour"></div>
      </div>
    </div>
  </div>

  <div class="groups-grid" id="groupsGrid"></div>
  <div class="cats-area" id="catsArea"></div>

  <div class="numpad">
    <div class="np-grid">
      <button class="np np-num" onclick="np('1')">1</button>
      <button class="np np-num" onclick="np('2')">2</button>
      <button class="np np-num" onclick="np('3')">3</button>
      <button class="np np-num" onclick="np('4')">4</button>
      <button class="np np-num" onclick="np('5')">5</button>
      <button class="np np-num" onclick="np('6')">6</button>
      <button class="np np-num" onclick="np('7')">7</button>
      <button class="np np-num" onclick="np('8')">8</button>
      <button class="np np-num" onclick="np('9')">9</button>
      <button class="np np-dot" onclick="np('.')">·</button>
      <button class="np np-num" onclick="np('0')">0</button>
      <button class="np np-del" onclick="npDel()">⌫</button>
    </div>
    <button class="np-ok" id="okBtn" disabled onclick="submit()">✓ <span id="okLabel">Enregistrer</span></button>
  </div>
</div>

<!-- HISTORIQUE -->
<div class="hist-overlay" id="histOverlay" onclick="closeHistIfBg(event)">
  <div class="hist-sheet">
    <div class="hist-hd">
      <span class="hist-title">Historique du mois</span>
      <button class="hist-close" onclick="closeHist()">Fermer</button>
    </div>
    <div class="hist-body" id="histBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyR1OXpZNyz3hBHRE7HuRylfJwW1MiRIUtyUfyJIJwIlx2CV7l0rmRFoe1Vp1KC88bFRw/exec';
const SECRET = '0603';

const GROUPS = [
  {key:'ali',icon:'🛒',label:'Ali.',color:'#1b5e20',bg:'#e8f5e9',bd:'#a5d6a7',
   cats:[{n:'Courses',i:'🧺'},{n:'Restaurant',i:'🍽️'},{n:'Boulangerie',i:'🥖'},{n:'Marché',i:'🥬'},{n:'Boucherie',i:'🥩'},{n:'Livraison repas',i:'🛵'}]},
  {key:'enf',icon:'👶',label:'Enfants',color:'#0d47a1',bg:'#e3f2fd',bd:'#90caf9',
   cats:[{n:'Cantine',i:'🍲'},{n:'Fournitures scolaires',i:'✏️'},{n:'Activités/sport enfants',i:'⚽'},{n:'Vêtements/chaussures enfants',i:'👕'},{n:'Inscription École/Univ',i:'🎓'},{n:'Sorties enfants',i:'🎠'}]},
  {key:'mai',icon:'🏠',label:'Maison',color:'#e65100',bg:'#fff3e0',bd:'#ffcc80',
   cats:[{n:'Réparation/Bricolage',i:'🔨'},{n:'Électroménager',i:'🫧'},{n:'Produits ménagers',i:'🧹'},{n:'Déco/meubles',i:'🪑'}]},
  {key:'tra',icon:'🚗',label:'Transport',color:'#4a148c',bg:'#f3e5f5',bd:'#ce93d8',
   cats:[{n:'Carburant',i:'⛽'},{n:'Parking',i:'🅿️'},{n:'Train/RER',i:'🚆'},{n:'Taxi/VTC',i:'🚕'},{n:'Péage',i:'🛣️'}]},
  {key:'con',icon:'⚡',label:'Conso.',color:'#0369a1',bg:'#e0f2fe',bd:'#7dd3fc',
   cats:[{n:'Énergie',i:'⚡'},{n:'Eau',i:'💧'},{n:'Granulets',i:'🪵'}]},
  {key:'san',icon:'❤️',label:'Santé',color:'#880e4f',bg:'#fce4ec',bd:'#f48fb1',
   cats:[{n:'Pharmacie',i:'💊'},{n:'Médecin',i:'🩺'},{n:'Dentiste',i:'🦷'},{n:'Optique',i:'👓'}]},
  {key:'loi',icon:'🎉',label:'Loisirs',color:'#006064',bg:'#e0f7fa',bd:'#80deea',
   cats:[{n:'Cinéma',i:'🎬'},{n:'Sorties',i:'🎵'},{n:'Sports/Fitness',i:'🏃'},{n:'Vacances',i:'✈️'},{n:'Potager',i:'🌱'},{n:'Cultures/livres/DVD',i:'📚'},{n:'Jeux',i:'🎮'}]},
  {key:'abo',icon:'📺',label:'Abon.',color:'#6d28d9',bg:'#ede9fe',bd:'#c4b5fd',
   cats:[{n:'Netflix',i:'🎬'},{n:'Apple TV',i:'🍎'},{n:'Amazon Prime',i:'📦'},{n:'YouTube Premium',i:'▶️'},{n:'Google One',i:'☁️'},{n:'Dropbox',i:'📂'},{n:'Autres',i:'📱'}]},
  {key:'sen',icon:'🌍',label:'Sénégal',color:'#f57f17',bg:'#fff8e1',bd:'#ffe082',
   cats:[{n:'Envoi famille',i:'💸'},{n:'Achats Sénégal',i:'🛍️'}]},
  {key:'div',icon:'•••',label:'Divers',color:'#33691e',bg:'#f1f8e9',bd:'#c5e1a5',
   cats:[{n:'Cadeaux',i:'🎁'},{n:'Imprévus',i:'⚠️'},{n:'Abonnements ponctuels',i:'📱'}]},
  {key:'don',icon:'🤲',label:'Dons',color:'#7c3aed',bg:'#f5f3ff',bd:'#ddd6fe',
   cats:[{n:'Dons',i:'🤲'}]},
  {key:'fet',icon:'🌟',label:'Fêtes',color:'#b45309',bg:'#fffbeb',bd:'#fde68a',
   cats:[{n:'Tabaski',i:'🌟'},{n:'Korite',i:'🌙'},{n:'Noël',i:'🎄'}]}
];

const today = new Date().toISOString().slice(0,10);
const currentMonth = today.slice(0,7);
let amount = '', selectedCat = null, activeGroup = 'ali';
let todayData = {};
let history = JSON.parse(localStorage.getItem('fd_history_day') || '[]');
let monthHistory = [];
let pendingQueue = JSON.parse(localStorage.getItem('fd_pending') || '[]');

GROUPS.forEach(g => todayData[g.key] = {total:0, cats:{}});
history = history.filter(e => e.date === today);
history.forEach(e => {
  const g = GROUPS.find(x => (x.cats||[]).some(c => c.n === e.cat));
  if (!g) return;
  todayData[g.key].total = (todayData[g.key].total||0) + e.amt;
  todayData[g.key].cats[e.cat] = (todayData[g.key].cats[e.cat]||0) + e.amt;
});

function saveHistory() { localStorage.setItem('fd_history_day', JSON.stringify(history)); }
function savePending() { localStorage.setItem('fd_pending', JSON.stringify(pendingQueue)); }

// FILE D'ATTENTE HORS LIGNE
async function processPending() {
  if (!pendingQueue.length) return;
  for (let i = pendingQueue.length - 1; i >= 0; i--) {
    try {
      const r = await fetch(SCRIPT_URL, {method:'POST',redirect:'follow',body:JSON.stringify({...pendingQueue[i],secret:SECRET})});
      const t = await r.text(); const d = JSON.parse(t);
      if (d.ok) pendingQueue.splice(i,1);
    } catch(e) { break; }
  }
  savePending(); updatePendingBadge();
}

function updatePendingBadge() {
  const btn = document.getElementById('histBtn');
  if (!btn) return;
  btn.innerHTML = pendingQueue.length > 0
    ? `⏱ Historique <span style="background:#ef4444;color:#fff;border-radius:999px;padding:1px 5px;font-size:9px">${pendingQueue.length}</span>`
    : '⏱ Historique';
}

async function syncAction(action) {
  try {
    const r = await fetch(SCRIPT_URL, {method:'POST',redirect:'follow',body:JSON.stringify({...action,secret:SECRET})});
    const t = await r.text(); const d = JSON.parse(t);
    if (!d.ok) throw new Error(d.error);
    return true;
  } catch(e) {
    pendingQueue.push({...action, _qid: Date.now()});
    savePending(); updatePendingBadge();
    return false;
  }
}

// RENDU
function renderGroups() {
  document.getElementById('groupsGrid').innerHTML = GROUPS.map(g => {
    const t = todayData[g.key]?.total || 0;
    return `<button class="grp-btn ${g.key===activeGroup?'active':''}"
      style="background:${g.key===activeGroup?g.bg:'#f8fafc'};color:${g.color};${g.key===activeGroup?'border-color:'+g.color:''}"
      onclick="switchGroup('${g.key}')">
      <span style="font-size:16px">${g.icon}</span>${g.label}
      ${t>0?`<span class="grp-badge">${Math.round(t)}€</span>`:''}
    </button>`;
  }).join('');
}

function renderCats() {
  const g = GROUPS.find(x => x.key === activeGroup);
  const cats = g.cats.slice();
  while (cats.length % 2 !== 0) cats.push(null);
  const rows = Math.ceil(cats.length / 2);
  document.getElementById('catsArea').innerHTML = `<div class="cat-grid" style="grid-template-rows:repeat(${rows},1fr)">${
    cats.map(c => c ? `<button class="cat-btn ${selectedCat===c.n?'sel':''}"
      style="background:${g.bg};color:${g.color};border-color:${selectedCat===c.n?'#2457ff':g.bd}"
      onclick="selectCat('${c.n}')">
      <span style="font-size:22px;line-height:1">${c.i}</span>${c.n}
      ${todayData[activeGroup]?.cats[c.n]>0?`<span class="cat-today">${Math.round(todayData[activeGroup].cats[c.n])}€</span>`:''}
    </button>` : `<div style="border-radius:12px;background:#f8fafc"></div>`
    ).join('')
  }</div>`;
}

function renderTotaux() {
  const g = GROUPS.find(x => x.key === activeGroup);
  const grpT = todayData[activeGroup]?.total || 0;
  const jourT = Math.round(Object.values(todayData).reduce((a,g) => a+(g.total||0), 0)*100)/100;
  const el = document.getElementById('totalGrp');
  if (grpT > 0) { el.style.visibility=''; el.textContent=Math.round(grpT)+'€ '+g.label; }
  else { el.style.visibility='hidden'; el.textContent='—'; }
  document.getElementById('totalJour').innerHTML = jourT > 0 ? `Jour : <strong>${Math.round(jourT)}€</strong>` : '';
}

function switchGroup(k) { activeGroup=k; selectedCat=null; renderGroups(); renderCats(); renderTotaux(); updateUI(); }
function selectCat(n) { selectedCat=n; renderCats(); updateUI(); }

function np(d) {
  if(d==='.'&&amount.includes('.'))return;
  if(d!=='.'&&amount.split('.')[1]?.length>=2)return;
  if(amount.length>=7)return;
  amount=(amount==='0'&&d!=='.')?d:amount+d;
  updateUI();
}
function npDel() { amount=amount.slice(0,-1); updateUI(); }

function updateUI() {
  const v = parseFloat(amount)||0;
  const el = document.getElementById('amtVal');
  el.textContent = amount||'0'; el.classList.toggle('amt-empty',!v);
  const hint=document.getElementById('amtHint'), ok=document.getElementById('okBtn'), lbl=document.getElementById('okLabel');
  if(v>0&&selectedCat){hint.textContent=selectedCat+' — prêt';hint.style.color='#4ade80';ok.disabled=false;lbl.textContent=`${v}€ · ${selectedCat}`;}
  else if(v>0){hint.textContent='Choisissez une catégorie';hint.style.color='#94a3b8';ok.disabled=true;lbl.textContent='Choisir une catégorie';}
  else if(selectedCat){hint.textContent=selectedCat+' — tapez le montant';hint.style.color='#94a3b8';ok.disabled=true;lbl.textContent='Entrer un montant';}
  else{hint.textContent='Choisissez une catégorie';hint.style.color='#475569';ok.disabled=true;lbl.textContent='Enregistrer';}
}

// SOUMETTRE
async function submit() {
  const v = parseFloat(amount); if(!v||!selectedCat)return;
  document.getElementById('okBtn').disabled = true;
  const entry = {id:Date.now(), date:today, group:activeGroup, cat:selectedCat, amt:v, time:new Date().toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'})};
  todayData[activeGroup].total = (todayData[activeGroup].total||0)+v;
  todayData[activeGroup].cats[selectedCat] = (todayData[activeGroup].cats[selectedCat]||0)+v;
  history.unshift(entry); saveHistory();
  const savedCat=selectedCat, savedAmt=v;
  amount=''; selectedCat=null;
  document.getElementById('amtVal').textContent='0'; document.getElementById('amtVal').classList.add('amt-empty');
  renderGroups(); renderCats(); renderTotaux(); updateUI();
  try {
    const r = await fetch(SCRIPT_URL,{method:'POST',redirect:'follow',body:JSON.stringify({action:'add_depense',secret:SECRET,depense:{date:today,montant:v,categorie:savedCat,proprietaire:'Foyer',note:'',_lid:entry.id}})});
    const t = await r.text(); const d = JSON.parse(t);
    if(d.ok){entry.sheet_id=d.id; saveHistory(); showToast(`${savedAmt}€ · ${savedCat} ✓`);}
    else showToast('Sauvegardé localement','warn');
  } catch(e){ showToast('Hors ligne — sauvegardé','warn'); }
  document.getElementById('okBtn').disabled = false;
}

// RESET
function resetTotaux() {
  if(!confirm('Remettre les totaux du jour à zéro ?'))return;
  GROUPS.forEach(g => todayData[g.key]={total:0,cats:{}});
  history=[]; saveHistory();
  renderGroups(); renderCats(); renderTotaux();
  showToast('Totaux remis à zéro');
}

// HISTORIQUE DU MOIS
async function openHist() {
  document.getElementById('histOverlay').classList.add('open');
  const body = document.getElementById('histBody');
  body.innerHTML = '<div class="hist-loading">Chargement…</div>';
  try {
    const url = SCRIPT_URL+'?'+new URLSearchParams({action:'get_historique',mois:currentMonth,secret:SECRET});
    const r = await fetch(url,{redirect:'follow'});
    const t = await r.text(); const data = JSON.parse(t);
    monthHistory = data.ok ? data.depenses.sort((a,b)=>b.date.localeCompare(a.date)) : [];
  } catch(e) {
    monthHistory = history.map(h=>({id:h.sheet_id||h.id,date:h.date,montant:h.amt,categorie:h.cat,statut:'nouveau'}));
  }
  renderHist();
}

function closeHist() { document.getElementById('histOverlay').classList.remove('open'); }
function closeHistIfBg(e) { if(e.target===e.currentTarget)closeHist(); }

function renderHist() {
  const body = document.getElementById('histBody');
  if(!monthHistory.length){body.innerHTML='<div class="hist-empty">Aucune dépense ce mois.</div>';return;}
  const total = monthHistory.reduce((a,e)=>a+Number(e.montant||0),0);
  const byDate = {};
  monthHistory.forEach(e=>{const d=String(e.date).slice(0,10);if(!byDate[d])byDate[d]=[];byDate[d].push(e);});
  body.innerHTML = `<div class="hist-total">Total du mois : ${Math.round(total)} €</div>`+
    Object.entries(byDate).map(([date,items])=>{
      const dayT = items.reduce((a,e)=>a+Number(e.montant||0),0);
      return `<div class="hist-day-hd"><span>${formatDate(date)}</span><span>${Math.round(dayT)} €</span></div>`+
        items.map(e=>{
          const g = GROUPS.find(x=>(x.cats||[]).some(c=>c.n===(e.categorie||e.cat)))||GROUPS[0];
          const archived = e.statut==='archivé';
          return `<div class="hist-item ${archived?'archived':''}">
            <div>
              <div class="hi-cat" style="color:${g.color}">${g.icon} ${g.label.replace('Ali.','Alimentation').replace('Abon.','Abonnements')}</div>
              <div class="hi-name">${e.categorie||e.cat}${archived?'<span class="hi-badge">Clôturé</span>':''}</div>
            </div>
            <div class="hi-right">
              <div class="hi-amt" style="color:${g.color}">${e.montant||e.amt} €</div>
              ${!archived?`<button class="hi-edit" onclick="editEntry('${e.id}',${e.montant||e.amt},'${e.categorie||e.cat}')">✏️</button>
              <button class="hi-del" onclick="deleteEntry('${e.id}',${e.montant||e.amt},'${e.categorie||e.cat}')">✕</button>`:''}
            </div>
          </div>`;
        }).join('');
    }).join('');
}

function formatDate(d) {
  return new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
}

// MODIFIER
function editEntry(id, amt, cat) {
  const modal = document.createElement('div');
  modal.className = 'edit-modal';
  modal.innerHTML = `<div class="edit-card">
    <div class="edit-title">Modifier la dépense</div>
    <div class="edit-field"><label>Montant (€)</label><input type="number" id="editAmt" value="${amt}" inputmode="decimal" step="0.01"></div>
    <div class="edit-field"><label>Catégorie</label><select id="editCat">${GROUPS.flatMap(g=>g.cats.map(c=>`<option ${c.n===cat?'selected':''}>${c.n}</option>`)).join('')}</select></div>
    <div class="edit-btns">
      <button class="edit-save" onclick="saveEdit('${id}')">Enregistrer</button>
      <button class="edit-cancel" onclick="this.closest('.edit-modal').remove()">Annuler</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  setTimeout(()=>document.getElementById('editAmt').focus(),100);
}

async function saveEdit(id) {
  const newAmt = parseFloat(document.getElementById('editAmt').value);
  const newCat = document.getElementById('editCat').value;
  if(!newAmt||newAmt<=0)return;
  document.querySelector('.edit-modal').remove();
  const e = monthHistory.find(x=>String(x.id)===String(id));
  if(e){e.montant=newAmt;e.categorie=newCat;}
  rebuildTodayData(); renderGroups(); renderCats(); renderTotaux(); renderHist();
  const ok = await syncAction({action:'update_depense',id,montant:newAmt,categorie:newCat});
  showToast(ok?`Modifié : ${newAmt}€ · ${newCat}`:'Modifié localement',ok?'success':'warn');
}

// SUPPRIMER
async function deleteEntry(id, amt, cat) {
  if(!confirm(`Supprimer ${amt}€ · ${cat} ?`))return;
  monthHistory = monthHistory.filter(x=>String(x.id)!==String(id));
  history = history.filter(x=>String(x.id)!==String(id)&&String(x.sheet_id)!==String(id));
  saveHistory(); rebuildTodayData(); renderGroups(); renderCats(); renderTotaux(); renderHist();
  const ok = await syncAction({action:'delete_depense',id});
  showToast(ok?'Dépense supprimée':'Supprimé localement',ok?'success':'warn');
}

function rebuildTodayData() {
  GROUPS.forEach(g => todayData[g.key]={total:0,cats:{}});
  [...monthHistory,...history].filter(e=>(String(e.date||'').slice(0,10)===today)&&e.statut!=='annulé').forEach(e=>{
    const g = GROUPS.find(x=>(x.cats||[]).some(c=>c.n===(e.categorie||e.cat)));
    if(!g)return;
    const amt=Number(e.montant||e.amt||0), cat=e.categorie||e.cat;
    todayData[g.key].total=(todayData[g.key].total||0)+amt;
    todayData[g.key].cats[cat]=(todayData[g.key].cats[cat]||0)+amt;
  });
}

// TOAST
function showToast(msg, type='success') {
  const el=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  el.className='toast'+(type==='warn'?' warn':'')+' show';
  setTimeout(()=>el.classList.remove('show'),2500);
}

// INIT
function setVH(){document.documentElement.style.setProperty('--vh',window.innerHeight*0.01+'px');}
window.addEventListener('resize',setVH); setVH();
window.addEventListener('online',()=>{processPending();showToast('Connexion rétablie');});
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
setTimeout(processPending,2000);
renderGroups(); renderCats(); renderTotaux(); updateUI(); updatePendingBadge();
</script>
</body>
</html>
